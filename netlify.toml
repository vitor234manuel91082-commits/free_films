[build]
  publish = "."

[[headers]]
  for = "/catalog.json"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Headers = "Origin, X-Requested-With, Content-Type, Accept"
    Access-Control-Allow-Methods = "GET, OPTIONS"
    Cache-Control = "public, max-age=0, must-revalidate"
